x-totalrecall-env: &totalrecall-env
  TOTALRECALL_ENVIRONMENT: docker
  TOTALRECALL_DATABASE_URL: postgresql://totalrecall:totalrecall@postgres:5432/totalrecall
  TOTALRECALL_AUTH_TOKENS: '{"dev-token":{"tenant_id":"tenant_dev","actor_id":"dev-user","roles":["admin"]}}'
  TOTALRECALL_FEATURE_FLAGS: '{"memory.adapter":"stub","memory.write_enabled":true,"memory.fail_open_on_search":true}'
  TOTALRECALL_LEARNING_PATH_MAPPINGS: ${TOTALRECALL_LEARNING_PATH_MAPPINGS:-{}}
  TOTALRECALL_ADMIN_DOCKER_CONTROL_ENABLED: ${TOTALRECALL_ADMIN_DOCKER_CONTROL_ENABLED:-false}
  TOTALRECALL_DOCKER_COMPOSE_PROJECT_DIR: ${TOTALRECALL_DOCKER_COMPOSE_PROJECT_DIR:-/app}
  TOTALRECALL_DOCKER_CONTROL_TIMEOUT_SECONDS: ${TOTALRECALL_DOCKER_CONTROL_TIMEOUT_SECONDS:-180}

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: totalrecall
      POSTGRES_USER: totalrecall
      POSTGRES_PASSWORD: totalrecall
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U totalrecall -d totalrecall"]
      interval: 2s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: .
      target: runtime
    environment:
      <<: *totalrecall-env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["migrate"]
    restart: "no"
    healthcheck:
      disable: true

  app:
    build:
      context: .
      target: runtime
    environment:
      <<: *totalrecall-env
      PORT: "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - ./local-secrets:/app/local-secrets
      - ${TOTALRECALL_LEARNING_WORKSPACE_HOST:-./learning-workspace}:/learning-workspace:ro
    command: ["api"]

  memory-wrapper:
    build:
      context: .
      target: runtime
    environment:
      <<: *totalrecall-env
      PORT: "8001"
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8001:8001"
    volumes:
      - ./local-secrets:/app/local-secrets
      - ${TOTALRECALL_LEARNING_WORKSPACE_HOST:-./learning-workspace}:/learning-workspace:ro
    command: ["memory-wrapper"]

  admin-ui:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "4173:80"
    volumes:
      - ./ui/admin:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  test:
    build:
      context: .
      target: test-stage
    environment:
      <<: *totalrecall-env
      TOTALRECALL_RUN_DATABASE_TESTS: "1"
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["test"]
    healthcheck:
      disable: true

volumes:
  postgres-data:
