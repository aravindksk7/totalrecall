services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: totalrecall
      POSTGRES_USER: totalrecall
      POSTGRES_PASSWORD: totalrecall
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U totalrecall -d totalrecall"]
      interval: 2s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      target: runtime
    environment:
      TOTALRECALL_ENVIRONMENT: docker
      TOTALRECALL_DATABASE_URL: postgresql://totalrecall:totalrecall@postgres:5432/totalrecall
      TOTALRECALL_AUTH_TOKENS: '{"dev-token":{"tenant_id":"tenant_dev","actor_id":"dev-user","roles":["admin"]}}'
      TOTALRECALL_FEATURE_FLAGS: '{"memory.adapter":"stub","memory.write_enabled":true,"memory.fail_open_on_search":true}'
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command:
      [
        "sh",
        "-c",
        "uv run python -m totalrecall.storage.migrations && uv run uvicorn totalrecall.main:app --host 0.0.0.0 --port 8000",
      ]

  memory-wrapper:
    build:
      context: .
      target: runtime
    environment:
      TOTALRECALL_ENVIRONMENT: docker
      TOTALRECALL_DATABASE_URL: postgresql://totalrecall:totalrecall@postgres:5432/totalrecall
      TOTALRECALL_AUTH_TOKENS: '{"dev-token":{"tenant_id":"tenant_dev","actor_id":"dev-user","roles":["admin"]}}'
      TOTALRECALL_FEATURE_FLAGS: '{"memory.adapter":"stub","memory.write_enabled":true,"memory.fail_open_on_search":true}'
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8001"
    command:
      [
        "sh",
        "-c",
        "uv run python -m totalrecall.storage.migrations && uv run uvicorn totalrecall.memory.service_app:app --host 0.0.0.0 --port 8001",
      ]

  test:
    build:
      context: .
      target: test-stage
    environment:
      TOTALRECALL_ENVIRONMENT: docker
      TOTALRECALL_DATABASE_URL: postgresql://totalrecall:totalrecall@postgres:5432/totalrecall
      TOTALRECALL_AUTH_TOKENS: '{"dev-token":{"tenant_id":"tenant_dev","actor_id":"dev-user","roles":["admin"]}}'
      TOTALRECALL_FEATURE_FLAGS: '{"memory.adapter":"stub","memory.write_enabled":true,"memory.fail_open_on_search":true}'
      TOTALRECALL_RUN_DATABASE_TESTS: "1"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "uv run python -m totalrecall.storage.migrations && uv run pytest"]
